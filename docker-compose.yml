version: '3.8'

services:
  jeopardy:
    build: .
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jeopardy_cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - jeopardy
